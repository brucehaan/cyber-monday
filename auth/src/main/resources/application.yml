spring:
  application:
    name: auth
  profiles:
    include: oauth
  datasource:
    driver-class-name: org.h2.Driver
    url: 'jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE' # In-Memory Mode
    username: sa
    password:

  h2:
    console:
      enabled: true
      path: /h2-console

  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
        format_sql: true
    show_sql: true
  security:
    oauth2:
      client:
        registration:
          kakao:
            client-name: kakao
            client-id:
            client-secret:
            redirect-uri: http://localhost:8080/login/oauth2/code/kakao
            authorization-grant-type: authorization_code
            scope:
              - openid
              - profile_nickname
              - account_email
            client-authentication-method: client_secret_post # 카카오 전용. 기본값이면 카카오 거부함
        provider:
          kakao:
            authorization_uri: https://kauth.kakao.com/oauth/authorize # 인가 화면 보내는 거
            token-uri: https://kauth.kakao.com/oauth/token #토큰 교환
            user-info-uri: https://kapi.kakao.com/v2/user/me # 사용자 정보 조회
            user-name-attribute: sub
            issuer-uri: https://kauth.kakao.com

  data:
    redis:
      host: localhost
      port: 6379

logging:
  level:
    org.springframework.security: TRACE

jwt:
  header: Authorization
  secret: weqrwfsdafewjkdshkjghdsajkhvdsjakvhjklshijoqwehiuofweqhguiorqehuifdhbvkjldfahvkjadfhfiuwo
  accessTokenExpiration: 3600
  refreshTokenExpiration: 604800

oauth2:
  login-success-uri: http://localhost:8080/login